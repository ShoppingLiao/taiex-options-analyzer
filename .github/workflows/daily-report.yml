name: Daily Options Report

on:
  # 結算日台灣時間 08:00 執行盤前預測 (UTC 00:00)
  schedule:
    - cron: '0 0 * * 3,5'  # 週三、週五 UTC 00:00 = 台灣 08:00 (盤前預測)
    - cron: '0 8 * * 1-5'  # 週一到週五 UTC 08:00 = 台灣 16:00 (每日報告)

  # 手動觸發
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYYMMDD)，留空則使用今天'
        required: false
        default: ''
      task:
        description: '執行任務'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto        # 自動判斷（根據星期幾和時間）
          - daily       # 只執行每日報告
          - settlement  # 只執行結算預報
          - review      # 只執行結算檢討
          - premarket   # 只執行盤前預測

env:
  TZ: Asia/Taipei

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Determine date and task
        id: config
        run: |
          # 決定日期
          if [ -n "${{ github.event.inputs.date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.date }}"
          else
            TARGET_DATE=$(date +%Y%m%d)
          fi
          echo "date=$TARGET_DATE" >> $GITHUB_OUTPUT

          # 決定任務
          TASK="${{ github.event.inputs.task }}"
          if [ "$TASK" = "auto" ] || [ -z "$TASK" ]; then
            # 自動判斷：根據星期幾和時間
            WEEKDAY=$(date +%u)  # 1=週一, 5=週五
            HOUR=$(date -u +%H)  # UTC 時間
            echo "weekday=$WEEKDAY" >> $GITHUB_OUTPUT
            echo "hour_utc=$HOUR" >> $GITHUB_OUTPUT

            # UTC 00:00 (台灣 08:00) 在週三(3)或週五(5)：盤前預測
            # UTC 08:00 (台灣 16:00) 時：
            #   週二(2)或週四(4)：產生結算預報
            #   週三(3)或週五(5)：執行結算檢討
            #   其他：只產生日報
            if [ "$HOUR" = "00" ] && ([ "$WEEKDAY" = "3" ] || [ "$WEEKDAY" = "5" ]); then
              echo "task=premarket" >> $GITHUB_OUTPUT
            elif [ "$WEEKDAY" = "2" ] || [ "$WEEKDAY" = "4" ]; then
              echo "task=settlement" >> $GITHUB_OUTPUT
            elif [ "$WEEKDAY" = "3" ] || [ "$WEEKDAY" = "5" ]; then
              echo "task=review" >> $GITHUB_OUTPUT
            else
              echo "task=daily" >> $GITHUB_OUTPUT
            fi
          else
            echo "task=$TASK" >> $GITHUB_OUTPUT
          fi

          echo "Target date: $TARGET_DATE"
          echo "Task: $TASK"

      - name: Check if trading day
        id: trading
        run: |
          python3 -c "
          from daily_workflow import is_trading_day
          from datetime import datetime

          date_str = '${{ steps.config.outputs.date }}'
          date_obj = datetime.strptime(date_str, '%Y%m%d')
          is_trading, reason = is_trading_day(date_obj)

          print(f'Date: {date_str}')
          print(f'Is trading day: {is_trading}')
          print(f'Reason: {reason}')

          # 輸出結果供後續步驟使用
          with open('$GITHUB_OUTPUT', 'a') as f:
              f.write(f'is_trading={str(is_trading).lower()}\n')
              f.write(f'reason={reason}\n')
          "

      - name: Run daily workflow
        if: steps.trading.outputs.is_trading == 'true'
        run: |
          echo "=== 執行工作流 ==="
          echo "日期: ${{ steps.config.outputs.date }}"
          echo "任務: ${{ steps.config.outputs.task }}"

          TASK="${{ steps.config.outputs.task }}"

          echo "更新結算校準參數..."
          python3 analyze_settlement_history.py

          if [ "$TASK" = "premarket" ]; then
            echo "執行盤前預測..."
            python3 daily_workflow.py --date ${{ steps.config.outputs.date }} --premarket --skip-git
          else
            echo "執行每日工作流..."
            python3 daily_workflow.py --date ${{ steps.config.outputs.date }} --skip-git
          fi

      - name: Skip non-trading day
        if: steps.trading.outputs.is_trading != 'true'
        run: |
          echo "=== 非交易日，跳過執行 ==="
          echo "日期: ${{ steps.config.outputs.date }}"
          echo "原因: ${{ steps.trading.outputs.reason }}"

      - name: Commit and push changes
        id: commit
        if: steps.trading.outputs.is_trading == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 添加變更的檔案
          git add docs/ reports/ logs/ data/ai_learning/

          # 檢查是否有變更
          if git diff --staged --quiet; then
            echo "沒有變更需要提交"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            DATE="${{ steps.config.outputs.date }}"
            TASK="${{ steps.config.outputs.task }}"

            case $TASK in
              daily)
                MSG="auto: $DATE 每日報告"
                ;;
              settlement)
                MSG="auto: $DATE 結算預報"
                ;;
              review)
                MSG="auto: $DATE 結算檢討"
                ;;
              premarket)
                MSG="auto: $DATE 盤前預測"
                ;;
              *)
                MSG="auto: $DATE 每日更新"
                ;;
            esac

            git commit -m "$MSG"
            git push

            echo "=== 已推送變更 ==="
            echo "提交訊息: $MSG"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        run: |
          echo "## 執行結果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **日期**: ${{ steps.config.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **任務**: ${{ steps.config.outputs.task }}" >> $GITHUB_STEP_SUMMARY
          echo "- **交易日**: ${{ steps.trading.outputs.is_trading }}" >> $GITHUB_STEP_SUMMARY
          echo "- **狀態**: ${{ steps.trading.outputs.reason }}" >> $GITHUB_STEP_SUMMARY

  # 部署 GitHub Pages
  deploy:
    needs: generate-report
    if: needs.generate-report.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # 確保取得最新的 main 分支

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deploy Summary
        run: |
          echo "## GitHub Pages 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 網站已更新: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
